# docker-compose.yml
version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: monitor-backend
    ports:
      - "4000:4000"
    environment:
      # Prisma connects to SQLite inside the container
      - DATABASE_URL=file:./dev.db
      - PORT=4000
      - CORS_ORIGIN=http://localhost:3000
      # Pass your real E2B API Key here so the cloud sandboxes work!
      - E2B_API_KEY=${E2B_API_KEY}
    volumes:
      # This maps your local prisma folder to the container
      # so your database isn't deleted when the container restarts
      - ./backend/prisma:/app/prisma
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # These tell the browser where to look for the API
        - NEXT_PUBLIC_API_URL=http://localhost:4000/api
        - NEXT_PUBLIC_WS_URL=http://localhost:4000
    container_name: monitor-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped